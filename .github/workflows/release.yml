name: Release

on:
  push:
    branches:
      - main
      - dev

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Debug Identities
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            security find-identity -v -p codesigning || true
          fi

      # ── main branch: build, sign, notarize ──
      - name: Build and Release (main)
        if: github.ref == 'refs/heads/main'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: 'evtx-to-csv v__VERSION__'
          releaseBody: |
            ## evtx-to-csv v__VERSION__

            Download the appropriate installer for your platform below.

            - **macOS**: `.dmg` (signed & notarized)
            - **Windows**: `.msi` installer
          releaseDraft: true
          prerelease: false
          # Temporarily removing universal target to see if native build succeeds
          args: ${{ matrix.platform == 'macos-latest' && '' || '' }}

      # ── dev branch: signed + notarized, published immediately as pre-release ──
      - name: Build and Release (dev)
        if: github.ref == 'refs/heads/dev'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__-dev.${{ github.run_number }}
          releaseName: 'evtx-to-csv v__VERSION__ (Dev build #${{ github.run_number }})'
          releaseBody: |
            **Development build** — may be unstable.

            Branch: `dev` | Run: #${{ github.run_number }} | Commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          # Temporarily removing universal target to see if native build succeeds
          args: ${{ matrix.platform == 'macos-latest' && '' || '' }}
